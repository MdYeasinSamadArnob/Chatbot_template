# AI Orchestration Chatbot — Docker Compose
#
# Services:
#   ollama      — Local LLM inference (http://localhost:11434)
#   bot-socket  — Chat + Socket.IO API (DMZ, http://localhost:9001)
#   admin-api   — KB admin API (MZ, http://localhost:9002)
#   bot-ui      — Next.js chat UI (http://localhost:3001)
#
# Usage:
#   docker compose up --build
#   # Pull a model (first time only):
#   docker exec -it ollama ollama pull llama3.2

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if you have NVIDIA GPU + nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bankbot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=pgvector"]

  bot-socket:
    build:
      context: ./bot-socket
      dockerfile: Dockerfile
    container_name: bot-socket
    ports:
      - "9001:9001"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=ollama/llama3.2
      - CORS_ORIGINS=["http://localhost:3001","http://bot-ui:3000"]
      - MEMORY_PERSIST_DIR=/app/memory_store
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/bankbot
      - EMBEDDING_MODEL=nomic-embed-text
      - PORT=9001
    volumes:
      - bot_socket_memory:/app/memory_store
    depends_on:
      - ollama
      - postgres
    restart: unless-stopped

  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    container_name: admin-api
    ports:
      - "9002:9002"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=ollama/llama3.2
      - CORS_ORIGINS=["http://localhost:3002","http://admin-ui:3000","http://localhost:3001","http://bot-ui:3000"]
      - MEMORY_PERSIST_DIR=/app/memory_store
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/bankbot
      - EMBEDDING_MODEL=nomic-embed-text
      - ADMIN_SECRET=Era-KB-Admin-2026-S3cr3t
      - PORT=9002
    volumes:
      - admin_api_memory:/app/memory_store
      - admin_api_uploads:/app/uploads
    depends_on:
      - ollama
      - postgres
    restart: unless-stopped

  bot-ui:
    build:
      context: ./bot-ui
      dockerfile: Dockerfile
    container_name: bot-ui
    ports:
      - "3001:3000"
    environment:
      - BOT_SOCKET_URL=http://bot-socket:9001
      - ADMIN_API_URL=http://admin-api:9002
      - NEXT_PUBLIC_BOT_SOCKET_URL=http://localhost:9001
      - NEXT_PUBLIC_ADMIN_UI_URL=http://localhost:3002
      - ADMIN_SECRET=Era-KB-Admin-2026-S3cr3t
    depends_on:
      - bot-socket
      - admin-api
    restart: unless-stopped

volumes:
  ollama_models:
  bot_socket_memory:
  admin_api_memory:
  admin_api_uploads:
  postgres_data:
